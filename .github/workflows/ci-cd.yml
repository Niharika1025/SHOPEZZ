name: ShopEZ CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Backend Integration Tests
        env:
          PORT: 5001
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/shopez-test
          JWT_SECRET: test_jwt_secret_token_key_123456
          JWT_REFRESH_SECRET: test_jwt_refresh_token_key_123456
        run: |
          cd backend
          npm run test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Compile Frontend Assets
        run: |
          cd frontend
          npm run build
